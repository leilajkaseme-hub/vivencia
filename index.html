<!DOCTYPE html>
<!-- Vivência -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vivência · Experiences in Madeira & Portugal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#ffffff;
  --surface:#f5f5f7;
  --surface-2:#fafafa;
  --ink:#1d1d1f;
  --muted:#6e6e73;
  --faint:#86868b;
  --line:#e6e6ea;
  --line-strong:#d2d2d7;
  --ocean:#0d7d77;
  --ocean-deep:#0a5f5a;
  --ocean-soft:#e7f3f2;
  --sun:#f0a23c;
  --sun-soft:#fcefdb;
  --rose:#c75d6b;
  --indigo:#5b6cc4;
  --violet:#8a6bd1;
  --green:#3f9d6b;
  --danger:#d8504a;
  --ok:#2f9e6b;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.05);
  --shadow:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 18px 50px rgba(0,0,0,.12),0 4px 14px rgba(0,0,0,.06);
  --r:16px;
  --r-sm:11px;
  --r-lg:22px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--ink);
  background:var(--canvas);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  letter-spacing:-.011em;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
img{display:block;max-width:100%}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:"tnum"}
.serif{font-family:'Fraunces',Georgia,serif}
:focus-visible{outline:2px solid var(--ocean);outline-offset:2px;border-radius:6px}

/* layout */
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.app-min{min-height:100vh;display:flex;flex-direction:column}
main{flex:1}
.sec{padding:84px 0}
.sec-tight{padding:54px 0}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ocean)}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.02em;line-height:1.08}
.h-xl{font-size:clamp(40px,6.2vw,72px);line-height:1.02}
.h-lg{font-size:clamp(30px,4vw,44px)}
.h-md{font-size:clamp(23px,2.6vw,30px)}
.lede{font-size:clamp(17px,1.6vw,20px);color:var(--muted);line-height:1.55;font-weight:400}

/* nav */
.nav{position:sticky;top:0;z-index:80;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
.nav-in{height:60px;display:flex;align-items:center;gap:28px}
.brand{display:flex;align-items:center;gap:9px;font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:-.02em}
.brand .dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--ocean),var(--ocean-deep));box-shadow:0 0 0 3px var(--ocean-soft)}
.nav-links{display:flex;gap:4px;margin-left:6px}
.nav-links a{font-size:14px;font-weight:450;color:var(--muted);padding:8px 12px;border-radius:9px;transition:.18s var(--ease)}
.nav-links a:hover{color:var(--ink);background:var(--surface)}
.nav-links a.on{color:var(--ink)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-toggle{display:none}

/* language switcher */
.lang-switch{position:relative}
.lang-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:550;color:var(--muted);padding:8px 12px;border-radius:980px;border:1px solid var(--line-strong);background:#fff;transition:.16s var(--ease)}
.lang-btn:hover{border-color:var(--ink);color:var(--ink)}
.lang-btn svg{width:15px;height:15px;display:block}
.lang-btn .chev{font-size:9px;color:var(--faint);transition:.18s var(--ease)}
.lang-switch.open .chev{transform:rotate(180deg)}
.lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:6px;min-width:178px;opacity:0;transform:translateY(-6px) scale(.97);transform-origin:top right;pointer-events:none;transition:.18s var(--ease);z-index:90}
.lang-menu.on{opacity:1;transform:none;pointer-events:auto}
.lang-opt{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:9px;font-size:14px;font-weight:500;color:var(--ink);transition:.14s;text-align:left}
.lang-opt:hover{background:var(--surface)}
.lang-opt.on{color:var(--ocean);font-weight:600}
.lang-opt .flag{font-size:16px;line-height:1}
.lang-opt .tick{margin-left:auto;color:var(--ocean);font-weight:700}

/* language multi-select (host wizard) */
.lang-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.lang-chip{padding:9px 14px;border-radius:980px;border:1px solid var(--line-strong);background:#fff;font-size:13.5px;font-weight:500;color:var(--ink);transition:.16s var(--ease);display:inline-flex;align-items:center;gap:7px}
.lang-chip:hover{border-color:var(--ink)}
.lang-chip.on{background:var(--ocean);color:#fff;border-color:var(--ocean)}
.lang-chip .c{font-size:12px;font-weight:700;opacity:.85}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:550;padding:10px 18px;border-radius:980px;transition:.18s var(--ease);white-space:nowrap}
.btn-primary{background:var(--ocean);color:#fff}
.btn-primary:hover{background:var(--ocean-deep);transform:translateY(-1px)}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:#000;transform:translateY(-1px)}
.btn-ghost{background:var(--surface);color:var(--ink)}
.btn-ghost:hover{background:#ececef}
.btn-line{border:1px solid var(--line-strong);background:#fff;color:var(--ink)}
.btn-line:hover{border-color:var(--ink);background:var(--surface-2)}
.btn-lg{padding:14px 26px;font-size:15px}
.btn-block{width:100%}
.btn-sm{padding:7px 13px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-danger{background:#fdecea;color:var(--danger)}
.btn-danger:hover{background:#fbded9}
.btn-ok{background:var(--ocean);color:#fff}

/* search composer */
.composer{margin-top:30px;background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:8px;display:flex;gap:6px;align-items:stretch}
.composer .field{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 14px;border-radius:11px;transition:.16s}
.composer .field:hover{background:var(--surface)}
.composer label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.07em}
.composer input,.composer select{border:none;background:transparent;font-size:15px;font-weight:500;outline:none;padding:3px 0;width:100%;color:var(--ink)}
.composer .sep{width:1px;background:var(--line);margin:8px 0}
.composer .go{align-self:center;width:46px;height:46px;border-radius:12px;background:var(--ocean);color:#fff;display:grid;place-items:center;transition:.18s var(--ease)}
.composer .go:hover{background:var(--ocean-deep)}

/* full-bleed hero with background video */
.hero{position:relative;min-height:90vh;display:flex;align-items:center;overflow:hidden;padding:0}
.hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:var(--ocean-deep)}
.hero-shade{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(6,28,26,.58),rgba(6,26,24,.40) 42%,rgba(4,20,18,.74))}
.hero-inner{position:relative;z-index:2;width:100%;max-width:920px;margin:0 auto;text-align:center;color:#fff;padding:72px 24px}
.hero-inner .eyebrow{color:rgba(255,255,255,.92)}
.hero-h1{color:#fff;margin:14px auto 0;max-width:780px;font-size:clamp(32px,4.6vw,58px);line-height:1.06;text-shadow:0 2px 30px rgba(0,0,0,.4)}
.hero-lede{color:rgba(255,255,255,.95);margin:18px auto 0;max-width:48ch;text-shadow:0 1px 16px rgba(0,0,0,.45)}
.hero-search{margin:34px auto 0;max-width:880px;text-align:left;box-shadow:var(--shadow-lg)}
.hero-go{border-radius:12px;padding:0 26px;align-self:stretch;white-space:nowrap;font-size:15px}
/* activity autocomplete */
.ac-field{position:relative}
.ac-menu{position:absolute;left:0;top:calc(100% + 12px);min-width:320px;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);padding:6px;max-height:248px;overflow-y:auto;overscroll-behavior:contain;z-index:60;display:none}
.ac-menu::-webkit-scrollbar{width:8px}
.ac-menu::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}
.ac-menu.on{display:block}
.ac-head{font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;padding:9px 11px 5px}
.ac-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--ink)}
.ac-item:hover,.ac-item.active{background:var(--surface)}
.ac-item .ic{width:30px;height:30px;border-radius:8px;background:var(--ocean-soft);display:grid;place-items:center;font-size:15px;flex-shrink:0}
.ac-item .sub{color:var(--faint);font-size:12px;font-weight:400;margin-left:auto;white-space:nowrap}
.hero .hero-trust{justify-content:center;margin-top:26px;gap:10px}
.hero .hero-trust .t{color:#fff;font-weight:600;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:9px 16px;border-radius:980px;border:1px solid rgba(255,255,255,.22);text-shadow:0 1px 6px rgba(0,0,0,.4)}
.hero .hero-trust .t b{color:#fff!important;font-weight:700}

/* trust row */
.trust{display:flex;gap:28px;margin-top:26px;flex-wrap:wrap}
.trust .t{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.trust .t b{color:var(--ink);font-weight:600}

/* category chips */
.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:980px;border:1px solid var(--line-strong);background:#fff;font-size:13px;font-weight:500;color:var(--ink);transition:.16s var(--ease)}
.chip:hover{border-color:var(--ink);background:var(--surface-2)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .ic{width:18px;height:18px;border-radius:6px;display:inline-block}

/* card grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:.22s var(--ease);cursor:pointer;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent}
.card .media{position:relative;aspect-ratio:4/3;overflow:hidden}
.card .media .photo{position:absolute;inset:0;background-size:cover;background-position:center;transition:.5s var(--ease)}
.card:hover .media .photo{transform:scale(1.05)}
.card .tag{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);font-size:11px;font-weight:600;padding:5px 11px;border-radius:980px;color:var(--ink);letter-spacing:.01em}
.card .like{position:absolute;top:11px;right:11px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.85);display:grid;place-items:center;font-size:15px;color:var(--muted)}
.card .body{padding:16px 16px 18px;display:flex;flex-direction:column;gap:7px;flex:1}
.card .loc{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.card .ttl{font-family:'Fraunces',serif;font-size:18px;font-weight:600;line-height:1.18;letter-spacing:-.01em}
.card .meta{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--muted);margin-top:2px}
.card .rate{display:flex;align-items:center;gap:4px;color:var(--ink);font-weight:600}
.card .rate .s{color:var(--sun)}
.card .foot{margin-top:auto;padding-top:10px;display:flex;align-items:baseline;justify-content:space-between;border-top:1px solid var(--line)}
.card .price{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px}
.card .price small{font-family:'Inter';font-weight:450;color:var(--muted);font-size:12px}

/* gradient placeholders by category */
.g-ocean{background:linear-gradient(135deg,#13a59c,#0a5f5a)}
.g-nature{background:linear-gradient(135deg,#4cb37e,#0d6f55)}
.g-food{background:linear-gradient(135deg,#f0a23c,#c75d6b)}
.g-culture{background:linear-gradient(135deg,#6f7fd6,#8a6bd1)}
.g-adventure{background:linear-gradient(135deg,#f08a3c,#d8504a)}

/* section head */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:30px}
.sec-head .lede{margin-top:10px}
.link-arrow{font-size:14px;font-weight:550;color:var(--ocean);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.link-arrow:hover{gap:9px}

/* how it works */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.step{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:28px}
.step .n{font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--ocean);width:34px;height:34px;border-radius:50%;background:var(--ocean-soft);display:grid;place-items:center;margin-bottom:16px}
.step h3{font-size:19px;margin-bottom:8px}
.step p{font-size:14.5px;color:var(--muted);line-height:1.55}

/* host band */
.band{background:linear-gradient(135deg,#0d7d77,#0a5048);border-radius:var(--r-lg);padding:56px;color:#fff;position:relative;overflow:hidden}
.band::before{content:"";position:absolute;right:-80px;top:-80px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.06)}
.band::after{content:"";position:absolute;right:60px;bottom:-120px;width:260px;height:260px;border-radius:50%;background:rgba(240,162,60,.14)}
.band h2{color:#fff;max-width:18ch;position:relative}
.band p{color:rgba(255,255,255,.82);margin-top:14px;max-width:46ch;position:relative;font-size:17px}
.band .row{display:flex;gap:38px;margin:30px 0;position:relative}
.band .stat b{font-family:'Fraunces',serif;font-size:30px;display:block}
.band .stat span{font-size:13px;color:rgba(255,255,255,.7)}
.band .btn{position:relative}

/* footer */
.foot{border-top:1px solid var(--line);background:var(--surface-2);padding:54px 0 36px;margin-top:40px}
.foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:32px}
.foot h4{font-family:'Inter';font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
.foot a{display:block;font-size:14px;color:var(--muted);padding:5px 0}
.foot a:hover{color:var(--ink)}
.foot-bottom{margin-top:40px;padding-top:22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:13px;color:var(--faint);flex-wrap:wrap;gap:12px}

/* explore */
.explore-head{padding:36px 0 8px}
.filters{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:18px 0 4px}
.fbox{display:flex;align-items:center;gap:8px;border:1px solid var(--line-strong);border-radius:11px;background:#fff;padding:9px 13px}
.fbox label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.fbox select,.fbox input{border:none;outline:none;background:transparent;font-size:14px;font-weight:500;color:var(--ink)}
.search-line{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;border:1px solid var(--line-strong);border-radius:11px;padding:10px 14px;background:#fff}
.search-line input{flex:1;border:none;outline:none;font-size:15px}
.result-meta{display:flex;justify-content:space-between;align-items:center;margin:22px 0 18px;color:var(--muted);font-size:14px}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .big{font-size:46px;margin-bottom:14px}

/* experience detail */
.exp-hero{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;gap:10px;height:440px;margin-top:24px;border-radius:var(--r-lg);overflow:hidden}
.exp-hero .ph{position:relative;overflow:hidden;background-size:cover;background-position:center}
.exp-hero .ph:first-child{grid-row:span 2}
.exp-detail{display:grid;grid-template-columns:1fr 380px;gap:48px;margin-top:40px;align-items:start}
.exp-title{font-size:clamp(28px,3.4vw,40px)}
.exp-sub{display:flex;align-items:center;gap:16px;color:var(--muted);font-size:14px;margin-top:12px;flex-wrap:wrap}
.exp-sub .rate{color:var(--ink);font-weight:600;display:flex;gap:5px;align-items:center}
.exp-sub .rate .s{color:var(--sun)}
.facts{display:flex;gap:14px;flex-wrap:wrap;margin:26px 0}
.fact{flex:1;min-width:130px;border:1px solid var(--line);border-radius:var(--r);padding:16px}
.fact .k{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.fact .v{font-size:16px;font-weight:600;margin-top:5px}
.divider{height:1px;background:var(--line);margin:32px 0}
.prose p{color:var(--ink);font-size:15.5px;line-height:1.7;margin-bottom:14px;font-weight:400}
.prose .muted{color:var(--muted)}
.inc{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;margin-top:8px}
.inc li{list-style:none;font-size:14.5px;display:flex;gap:10px;align-items:flex-start;color:var(--ink)}
.inc li .ck{color:var(--ocean);font-weight:700;flex-shrink:0}
.host-card{display:flex;gap:16px;align-items:center;border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-top:6px}
.host-card .av{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--ocean),var(--ocean-deep));display:grid;place-items:center;color:#fff;font-weight:600;font-family:'Fraunces',serif;font-size:20px;flex-shrink:0}
.host-card .nm{font-weight:600;font-size:16px;display:flex;align-items:center;gap:7px}
.verified{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--ocean);background:var(--ocean-soft);padding:2px 8px;border-radius:980px}
.review{border-top:1px solid var(--line);padding:20px 0;display:flex;gap:14px}
.review .av{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;font-size:15px;flex-shrink:0;font-family:'Fraunces',serif}
.review .s{color:var(--sun);font-size:12px}

/* booking widget */
.booker{position:sticky;top:84px;border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow);background:#fff}
.booker .pr{display:flex;align-items:baseline;gap:6px;margin-bottom:18px}
.booker .pr b{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600}
.booker .pr span{color:var(--muted);font-size:14px}
.bk-field{border:1px solid var(--line-strong);border-radius:12px;padding:11px 14px;margin-bottom:10px}
.bk-field label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;display:block}
.bk-field input{border:none;outline:none;font-size:15px;font-weight:500;width:100%;margin-top:3px;background:transparent}
.stepper{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.stepper b{font-size:16px;font-weight:600}
.stepper button{width:30px;height:30px;border-radius:50%;border:1px solid var(--line-strong);font-size:17px;color:var(--ink);display:grid;place-items:center;background:#fff}
.stepper button:hover{border-color:var(--ink)}
.bk-sum{margin:16px 0;font-size:14px}
.bk-sum .r{display:flex;justify-content:space-between;padding:6px 0;color:var(--muted)}
.bk-sum .r.tot{border-top:1px solid var(--line);margin-top:6px;padding-top:12px;color:var(--ink);font-weight:600;font-size:16px}
.bk-sum .r .mono{color:var(--ink)}
.bk-note{font-size:12px;color:var(--faint);text-align:center;margin-top:10px}

/* host wizard */
.wiz{max-width:760px;margin:0 auto;padding:40px 0 80px}
.wiz-prog{display:flex;gap:8px;margin-bottom:8px}
.wiz-prog .seg{flex:1;height:4px;border-radius:980px;background:var(--line)}

/* ============================ ROUTER ============================ */
function router(){
  const app=document.getElementById('app');
  window.scrollTo(0,0);
  const raw=(location.hash||'#/').replace(/^#\//,'');
  const qi=raw.indexOf('?');
  const path=qi>=0?raw.slice(0,qi):raw;
  const parts=path.split('/');
  const root=parts[0]||'';
  let html='';
  if(root===''){ html=viewHome(); }
  else if(root==='explore'){ html=viewExplore(); }
  else if(root==='experience'){ const e=expById(parts[1]); html=e?viewExperience(e):view404(); }
  else if(root==='host'){ html=viewHost(); }
  else if(root==='auth'){ html=viewAuth(); }
  else if(root==='dashboard'){ html=viewDashboard(); }
  else if(root==='admin'){ html=viewAdmin(); }
  else html=view404();
  app.innerHTML=html;
  renderNav();
  renderFooter();
  hydratePhotos(app);
  if(typeof afterRender==='function' && afterRender._fn){ afterRender._fn(); afterRender._fn=null; }
  observeReveal();
}
function afterRender(fn){ afterRender._fn=fn; }
window.addEventListener('hashchange',()=>router());

function observeReveal(){
  const els=document.querySelectorAll('.reveal');
  if(!('IntersectionObserver' in window)){ els.forEach(e=>e.classList.add('in')); return; }
  const io=new IntersectionObserver((ents)=>{ ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target);} }); },{threshold:.12});
  els.forEach(e=>io.observe(e));
}

const origRouter=router;
function bindHome(){
  const go=document.getElementById('hsGo'); if(!go) return;
  const qEl=document.getElementById('hsQ');
  const menu=document.getElementById('acMenu');
  const run=()=>{
    const q=qEl.value.trim();
    const d=document.getElementById('hsDate').value;
    const tr=document.getElementById('hsTravelers').value;
    const p=new URLSearchParams();
    if(q)p.set('q',q); if(d)p.set('date',d); if(tr&&tr!=='1')p.set('travelers',tr);
    const qs=p.toString();
    location.hash='#/explore'+(qs?('?'+qs):'');
  };
  go.onclick=run;

  // ---- activity autocomplete ----
  const hideAC=()=>{ if(menu){ menu.classList.remove('on'); } };
  const renderAC=()=>{
    if(!menu) return;
    const f=qEl.value.toLowerCase().trim();
    let list=acSuggestions();
    if(f) list=list.filter(it=>it.label.toLowerCase().includes(f));
    if(!list.length){ hideAC(); return; }
    const head = f ? '' : '<div class="ac-head">'+t('feat_eyebrow')+'</div>';
    menu.innerHTML = head + list.map((it,i)=>
      '<div class="ac-item'+(f&&i===0?' active':'')+'" data-val="'+escapeHtml(it.label)+'">'
      +'<span class="ic">'+it.ic+'</span><span>'+escapeHtml(it.label)+'</span>'
      +'<span class="sub">'+escapeHtml(it.sub)+'</span></div>').join('');
    menu.querySelectorAll('.ac-item').forEach(el=>{
      el.addEventListener('mousedown',ev=>{ ev.preventDefault(); qEl.value=el.getAttribute('data-val'); hideAC(); run(); });
    });
    menu.classList.add('on');
  };
  const move=(dir)=>{
    if(!menu||!menu.classList.contains('on')) return;
    const items=[...menu.querySelectorAll('.ac-item')]; if(!items.length) return;
    let idx=items.findIndex(el=>el.classList.contains('active'));
    if(idx>=0) items[idx].classList.remove('active');
    idx=(idx+dir+items.length)%items.length;
    items[idx].classList.add('active'); items[idx].scrollIntoView({block:'nearest'});
  };
  qEl.addEventListener('focus',renderAC);
  qEl.addEventListener('input',renderAC);
  qEl.addEventListener('keydown',e=>{
    if(e.key==='ArrowDown'){ e.preventDefault(); move(1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); move(-1); }
    else if(e.key==='Enter'){ const act=menu&&menu.querySelector('.ac-item.active'); if(act){ qEl.value=act.getAttribute('data-val'); } hideAC(); run(); }
    else if(e.key==='Escape'){ hideAC(); }
  });
  document.addEventListener('click',e=>{ if(!e.target.closest('.ac-field')) hideAC(); });
}

function parseQuery(){

}

        const {data,error}=await SB.auth.signUp({email,password:pass,options:{data:{name}}});

        if(data.session){ syncSession(data.session); await loadData(); toast(t('auth_created_toast')); location.hash='#/dashboard'; }
        else { toast(t('auth_check_email')); setAuth('login'); }
      }
    } finally { go.disabled=false; }
  };

}

function fileChip(key,f){

function fmtSize(b){ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }

function bindHost(){
  const card=document.getElementById('wizCard'); if(!card) return;
  // document upload binding
  card.querySelectorAll('[data-doc]').forEach(drop=>{
    const key=drop.getAttribute('data-doc');
    const input=drop.querySelector('[data-doc-input]');
    if(!input) return;
    drop.addEventListener('click',()=>input.click());
    input.addEventListener('change',()=>{
      const f=input.files[0]; if(!f) return;
      const rec={name:f.name,type:f.type,size:f.size};
      // store small images as preview only
      wizData.docs[key]=rec;
      rerenderWiz();
      toast(t('uploaded_toast',{name:f.name}));
    });
  });
  card.querySelectorAll('[data-doc-remove]').forEach(x=>{
    x.addEventListener('click',()=>{ wizData.docs[x.getAttribute('data-doc-remove')]=null; rerenderWiz(); });
  });
  // language multi-select chips
  card.querySelectorAll('.lang-chip').forEach(ch=>{
    ch.addEventListener('click',()=>{
      const on=ch.classList.toggle('on');
      const mark=ch.querySelector('.c'); if(mark) mark.textContent=on?'✓':'+';
      wizData.languages=[...card.querySelectorAll('.lang-chip.on')].map(c=>c.getAttribute('data-lang')).join(', ');
      const field=ch.closest('.field'); if(field) field.classList.remove('err');
    });
  });
}

function collectWiz(){

    wizData.business=g('w_business'); wizData.nif=g('w_nif'); wizData.phone=g('w_phone'); wizData.base=g('w_base');
  } else if(wizStep===2){
    wizData.about=g('w_about'); wizData.years=g('w_years'); wizData.category=g('w_category');
    const lp=document.getElementById('w_languages');
    if(lp) wizData.languages=[...lp.querySelectorAll('.lang-chip.on')].map(c=>c.getAttribute('data-lang')).join(', ');
  } else if(wizStep===4){

    e.location=g('w_exp_location'); e.price=g('w_exp_price'); e.durationHrs=g('w_exp_durationHrs'); e.groupMax=g('w_exp_groupMax'); e.img=g('w_exp_img');
  }
}
function validateWiz(){
  collectWiz();
  let ok=true; const fail=k=>{ const f=document.querySelector('[data-k="'+k+'"]'); if(f){f.classList.add('err'); if(ok){f.querySelector('input,textarea,select')?.focus();}} ok=false; };
  document.querySelectorAll('.field.err').forEach(f=>f.classList.remove('err'));
  const u=me();
  if(wizStep===1){
    if(!wizData.name) fail('name');
    if(!u && !/.+@.+\..+/.test(wizData.email)) fail('email');
    if(!u && (!wizData.pass||wizData.pass.length<4)) fail('pass');
    if(!wizData.business) fail('business');
    if(!wizData.phone) fail('phone');
    if(!wizData.base) fail('base');
  } else if(wizStep===2){
    if(!wizData.about) fail('about');
    if(!wizData.languages) fail('languages');
  } else if(wizStep===3){
    if(!wizData.docs.id||!wizData.docs.license||!wizData.docs.insurance){ toast(t('upload_all_docs'),'err'); ok=false; }
  } else if(wizStep===4){
    const e=wizData.exp;
    if(!e.title) fail('exp_title'); if(!e.summary) fail('exp_summary'); if(!e.location) fail('exp_location');
    if(!e.price||+e.price<=0) fail('exp_price'); if(!e.durationHrs||+e.durationHrs<=0) fail('exp_durationHrs');
    if(!e.groupMax||+e.groupMax<=0) fail('exp_groupMax');
  }
  return ok;
}

  const liveCount=myExp.filter(e=>e.status==='live').length;
  const pendingCount=myExp.filter(e=>e.status==='pending').length;
  const banner = hp.status==='verified'
    ? '<div class="banner ok"><span class="ic">✓</span><div>'+t('banner_verified')+'</div></div>'
    : hp.status==='rejected'
    ? '<div class="banner pending" style="background:#fdecea;border-color:#f4cfcb;color:#a23a35"><span class="ic">⚠</span><div>'+t('banner_rejected')+'</div></div>'
    : '<div class="banner pending"><span class="ic">⏱</span><div>'+t('banner_review')+'</div></div>';

  const tabs=[['overview',t('tab_overview')],['listings',t('tab_listings')],['bookings',t('tab_bookings')],['account',t('tab_account')]];
  let body='';
  if(dashTab==='overview'){
    body=`<div class="stat-grid">
      <div class="stat-card"><div class="k">${t('stat_gross')}</div><div class="v">${money(gross)}</div><div class="sub">${t('bookings_word',{n:myBk.length})}</div></div>
      <div class="stat-card"><div class="k">${t('stat_commission')}</div><div class="v">${money(fees)}</div><div class="sub">${t('platform_fee')}</div></div>
      <div class="stat-card"><div class="k">${t('stat_payout')}</div><div class="v" style="color:var(--ocean-deep)">${money(payout)}</div><div class="sub">${t('net_toyou')}</div></div>
      <div class="stat-card"><div class="k">${t('stat_live')}</div><div class="v">${liveCount}<small> / ${myExp.length}</small></div><div class="sub">${t('inreview',{n:pendingCount})}</div></div>
    </div>
    <h2 class="h-md" style="margin:8px 0 16px">${t('recent_bookings')}</h2>
    ${myBk.length? myBk.slice(0,5).map(b=>bookingRow(b,'host')).join('') : '<p class="muted-line">'+t('nobk_host')+'</p>'}`;
  } else if(dashTab==='listings'){
    body=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <h2 class="h-md">${t('your_listings')}</h2>
        <button class="btn btn-primary btn-sm" onclick="openNewListing()" ${hp.status!=='verified'?'disabled title="'+t('verify_first')+'"':''}>${t('new_listing')}</button></div>
      ${ hp.status!=='verified' ? '<div class="banner pending"><span class="ic">⏱</span><div>'+t('listings_locked')+'</div></div>':''}
      ${myExp.length? myExp.map(e=>listingRow(e)).join('') : '<p class="muted-line">'+t('nolistings')+'</p>'}`;
  } else if(dashTab==='bookings'){
    body=`<h2 class="h-md" style="margin-bottom:16px">${t('all_bookings')}</h2>
      ${myBk.length? myBk.map(b=>bookingRow(b,'host')).join('') : '<p class="muted-line">'+t('nobk_host')+'</p>'}`;
  } else {
    body=`<h2 class="h-md" style="margin-bottom:16px">${t('account_verification')}</h2>
      <div class="review-list" style="max-width:560px">
        <div class="rl"><span class="k">${t('rl_status')}</span><span class="v"><span class="pill ${hp.status||'pending'}">${statusLabel(hp.status||'pending')}</span></span></div>
        <div class="rl"><span class="k">${t('rl_business')}</span><span class="v">${escapeHtml(hp.business||'—')}</span></div>
        <div class="rl"><span class="k">${t('rl_basedin')}</span><span class="v">${escapeHtml(hp.base||'—')}</span></div>
        <div class="rl"><span class="k">${t('rl_phone')}</span><span class="v">${escapeHtml(hp.phone||'—')}</span></div>
        <div class="rl"><span class="k">${t('rl_langs')}</span><span class="v">${escapeHtml(hp.languages||'—')}</span></div>
        <div class="rl"><span class="k">${t('rl_documents')}</span><span class="v">${t('docs_uploaded',{n:(hp.docs||[]).length})}</span></div>
      </div>`;
  }
  return `<section class="dash"><div class="wrap">
    <div class="dash-head"><div><h1 class="serif">${escapeHtml(hp.business||u.name)}</h1><p>${t('host_dash_sub',{base:escapeHtml(hp.base||'')})}</p></div></div>
    ${banner}
    <div class="tabs">${tabs.map(t=>'<button class="'+(dashTab===t[0]?'on':'')+'" onclick="setDashTab(\''+t[0]+'\')">'+t[1]+(t[0]==='listings'&&pendingCount?'<span class="badge">'+pendingCount+'</span>':'')+'</button>').join('')}</div>
    ${body}
  </div></section>`;
}
function setDashTab(t){ dashTab=t; router(); }
function listingRow(e){
  const c=catOf(e.category);
  return '<div class="lcard"><div class="thumb '+c.g+'" data-photo="'+e.img+'"></div>'
    +'<div class="main"><div class="t">'+e.title+'</div><div class="s">'+e.location+', '+e.region+' · '+money(e.price)+' '+t('per_person')+' · '+t('fact_upto',{n:e.groupMax})+'</div></div>'
    +'<div class="right"><span class="pill '+e.status+'">'+statusLabel(e.status)+'</span>'
    +(e.status==='live'?'<a class="code" href="#/experience/'+e.id+'">'+t('view_live')+'</a>':'<span class="code">'+(e.status==='pending'?t('awaiting_review'):t('needs_changes'))+'</span>')
    +'</div></div>';
}
function openNewListing(){
  const u=me();
  openModal(`
    <div class="modal-head"><h3>${t('nl_title')}</h3><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      <div class="field"><label>${t('f_title')}</label><input id="nl_title" placeholder="Private kayak tour"></div>
      <div class="field"><label>${t('f_summary')}</label><input id="nl_summary" placeholder="Paddle into hidden sea caves"></div>
      <div class="form-row">
        <div class="field"><label>${t('f_category')}</label><select id="nl_cat">${CATS.map(c=>'<option value="'+c.id+'">'+catLabel(c)+'</option>').join('')}</select></div>
        <div class="field"><label>${t('f_region')}</label><select id="nl_region">${REGIONS.map(r=>'<option>'+r+'</option>').join('')}</select></div>
      </div>
      <div class="field"><label>${t('f_meeting')}</label><input id="nl_loc" placeholder="Garajau"></div>
      <div class="form-row">
        <div class="field"><label>${t('nl_price')}</label><input id="nl_price" type="number" placeholder="42"></div>
        <div class="field"><label>${t('nl_dur')}</label><input id="nl_dur" type="number" step="0.5" placeholder="2"></div>
      </div>
      <div class="field"><label>${t('nl_max')}</label><input id="nl_max" type="number" placeholder="8"></div>
      <button class="btn btn-primary btn-block btn-lg" id="nl_go">${t('submit_review')}</button>
      <p class="bk-note">${t('nl_note')}</p>
    </div>`);
  const nlBtn=document.getElementById('nl_go');
  nlBtn.onclick=async ()=>{
    const g=id=>document.getElementById(id).value.trim();
    const title=g('nl_title'),summary=g('nl_summary'),loc=g('nl_loc'),price=g('nl_price'),dur=g('nl_dur'),max=g('nl_max');
    if(!title||!summary||!loc||!price||!dur||!max){ toast(t('fill_all_toast'),'err'); return; }
    if(!SB){ toast('Service indisponible, réessaie','err'); return; }
    nlBtn.disabled=true;
    const exp={ host_id:u.id, host_name:u.name, title, category:g('nl_cat'), region:g('nl_region'), location:loc,
      price:+price, duration_hrs:+dur, group_max:+max, summary, descr:[summary], inc:['Local guide','Safety briefing'],
      img:'img/coastal-cliff.jpg', gallery:[], status:'pending' };
    const ins=await SB.from('experiences').insert(exp);
    if(ins.error){ nlBtn.disabled=false; toast(ins.error.message||'Error','err'); return; }
    await loadData();
    closeModal(); toast(t('listing_submitted_toast')); dashTab='listings'; router();
  };
}

/* ============================ ADMIN ============================ */
let adminTab='hosts';
function viewAdmin(){
  const u=me();
  if(!u || u.role!=='admin'){ location.hash='#/auth'; toast(t('admin_only_toast'),'err'); return '<section class="dash"><div class="wrap"></div></section>'; }
  const users=DB.users(), exps=DB.experiences(), bks=DB.bookings();
  const pendingHosts=users.filter(x=>x.role==='host'&&x.host&&x.host.status==='pending');
  const pendingExp=exps.filter(e=>e.status==='pending');
  const revenue=bks.reduce((s,b)=>s+b.commission,0);
  const gmv=bks.reduce((s,b)=>s+b.subtotal,0);

  const tabs=[['hosts',t('atab_hosts'),pendingHosts.length],['listings',t('atab_listings'),pendingExp.length],['bookings',t('atab_bookings'),0],['users',t('atab_users'),0]];
  let body='';
  if(adminTab==='hosts'){
    body = pendingHosts.length
      ? pendingHosts.map(h=>hostAppCard(h)).join('')
      : '<div class="empty"><div class="big">✓</div><h3 class="h-md">'+t('noapps_t')+'</h3><p style="margin-top:8px">'+t('noapps_p')+'</p></div>';
    const verified=users.filter(x=>x.role==='host'&&x.host&&x.host.status==='verified');
    if(verified.length) body+='<h2 class="h-md" style="margin:30px 0 14px">'+t('verified_hosts')+'</h2>'+verified.map(h=>hostAppCard(h,true)).join('');
  } else if(adminTab==='listings'){
    body = pendingExp.length
      ? pendingExp.map(e=>listingReviewCard(e)).join('')
      : '<div class="empty"><div class="big">✓</div><h3 class="h-md">'+t('nothing_review_t')+'</h3><p style="margin-top:8px">'+t('nothing_review_p')+'</p></div>';
  } else if(adminTab==='bookings'){
    body = '<div class="result-meta"><span>'+t('bookings_gross',{n:'<b style="color:var(--ink)">'+bks.length+'</b>',gmv:money(gmv)})+'</span></div>'
      + (bks.length? bks.map(b=>adminBookingRow(b)).join('') : '<p class="muted-line">'+t('nobk_host')+'</p>');
  } else {
    body = users.map(x=>'<div class="lcard"><div class="thumb" style="background:'+avFor(x.name)+';display:grid;place-items:center;color:#fff;font-family:Fraunces;font-weight:600;font-size:18px">'+initials(x.name)+'</div>'
      +'<div class="main"><div class="t">'+escapeHtml(x.name)+'</div><div class="s">'+escapeHtml(x.email)+'</div></div>'
      +'<div class="right"><span class="pill '+(x.role==='admin'?'verified':x.role==='host'?'live':'pending')+'">'+roleLabel(x.role)+'</span></div></div>').join('');
  }
  return `<section class="dash"><div class="wrap">
    <div class="dash-head"><div><h1 class="serif">${t('admin_t')}</h1><p>${t('admin_sub')}</p></div></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="k">${t('stat_revenue')}</div><div class="v" style="color:var(--ocean-deep)">${money(revenue)}</div><div class="sub">${t('revenue_sub',{gmv:money(gmv)})}</div></div>
      <div class="stat-card"><div class="k">${t('stat_pendinghosts')}</div><div class="v">${pendingHosts.length}</div><div class="sub">${t('awaiting_review')}</div></div>
      <div class="stat-card"><div class="k">${t('stat_pendinglistings')}</div><div class="v">${pendingExp.length}</div><div class="sub">${t('awaiting_review')}</div></div>
      <div class="stat-card"><div class="k">${t('stat_liveexp')}</div><div class="v">${exps.filter(e=>e.status==='live').length}</div><div class="sub">${t('hosts_count',{n:users.filter(x=>x.role==='host').length})}</div></div>
    </div>
    <div class="tabs">${tabs.map(t=>'<button class="'+(adminTab===t[0]?'on':'')+'" onclick="setAdminTab(\''+t[0]+'\')">'+t[1]+(t[2]?'<span class="badge">'+t[2]+'</span>':'')+'</button>').join('')}</div>
    ${body}
  </div></section>`;
}
function setAdminTab(t){ adminTab=t; router(); }
function hostAppCard(h,verified){
  const hp=h.host;
  const docs=(hp.docs||[]).map(d=>'<span class="code" style="background:var(--surface);padding:3px 9px;border-radius:7px;margin-right:6px">📄 '+escapeHtml(d.name)+'</span>').join('');
  const acts = verified ? '<span class="pill verified">'+t('verified_badge')+'</span>'
    : '<button class="btn btn-ok btn-sm" onclick="verifyHost(\''+h.id+'\')">'+t('approve')+'</button><button class="btn btn-danger btn-sm" onclick="rejectHost(\''+h.id+'\')">'+t('reject')+'</button>';
  return `<div class="lcard" style="align-items:flex-start">
    <div class="thumb" style="background:linear-gradient(135deg,${avFor(h.name)},${avFor(h.name)}cc);display:grid;place-items:center;color:#fff;font-family:Fraunces;font-weight:600;font-size:20px">${initials(h.name)}</div>
    <div class="main">
      <div class="t">${escapeHtml(hp.business||h.name)} <span class="code">· ${escapeHtml(h.name)}</span></div>
      <div class="s">${escapeHtml(hp.base||'')} · ${escapeHtml(hp.languages||'')} · ${catLabel(hp.category)}</div>
      <div class="muted-line" style="font-size:13px;margin:8px 0">${escapeHtml(hp.about||'')}</div>
      <div>${docs||'<span class="code">'+t('nodocuments')+'</span>'}</div>
    </div>
    <div class="right"><div class="acts">${acts}</div></div>
  </div>`;
}
async function verifyHost(id){
  const u=DB.users().find(x=>x.id===id); if(!SB) return;
  const {error}=await SB.from('profiles').update({host_status:'verified'}).eq('id',id);
  if(error){ toast(error.message,'err'); return; }
  await loadData(); toast(t('verified_toast',{name:(u&&u.name?u.name.split(' ')[0]:'')})); router();
}
async function rejectHost(id){
  if(!SB) return;
  const {error}=await SB.from('profiles').update({host_status:'rejected'}).eq('id',id);
  if(error){ toast(error.message,'err'); return; }
  await loadData(); toast(t('rejected_toast'),'err'); router();
}
function listingReviewCard(e){
  const host=DB.users().find(u=>u.id===e.hostId);
  const hostVerified = host&&host.host&&host.host.status==='verified';
  const c=catOf(e.category);
  return `<div class="lcard" style="align-items:flex-start">
    <div class="thumb ${c.g}" data-photo="${e.img}"></div>
    <div class="main">
      <div class="t">${e.title}</div>
      <div class="s">${e.location}, ${e.region} · ${money(e.price)} ${t('per_person')} · ${t('fact_upto',{n:e.groupMax})} · ${e.durationHrs}h</div>
      <div class="muted-line" style="font-size:13px;margin-top:6px">${escapeHtml(e.summary)}</div>
      <div class="code" style="margin-top:6px">${t('host_label',{name:escapeHtml(e.hostName)})} ${hostVerified?'<span class="pill verified" style="margin-left:6px">'+t('host_verified_pill')+'</span>':'<span class="pill pending" style="margin-left:6px">'+t('host_notverified_pill')+'</span>'}</div>
    </div>
    <div class="right"><div class="acts">
      <button class="btn btn-ok btn-sm" onclick="approveExp('${e.id}')" ${hostVerified?'':'disabled title="'+t('verifyhost_first')+'"'}>${t('approve')}</button>
      <button class="btn btn-danger btn-sm" onclick="rejectExp('${e.id}')">${t('reject')}</button>
    </div></div>
  </div>`;
}
async function approveExp(id){
  const e=expById(id); const host=e?DB.users().find(u=>u.id===e.hostId):null;
  if(!host||!host.host||host.host.status!=='verified'){ toast(t('verify_before_toast'),'err'); return; }
  if(!SB) return;
  const {error}=await SB.from('experiences').update({status:'live'}).eq('id',id);
  if(error){ toast(error.message,'err'); return; }
  await loadData(); toast(t('listing_live_toast')); router();
}
async function rejectExp(id){
  if(!SB) return;
  const {error}=await SB.from('experiences').update({status:'rejected'}).eq('id',id);
  if(error){ toast(error.message,'err'); return; }
  await loadData(); toast(t('listing_rejected_toast'),'err'); router();
}
function adminBookingRow(b){
  const e=expById(b.expId); const c=e?catOf(e.category):CATS[0];
  return '<div class="lcard"><div class="thumb '+c.g+'" '+(e?'data-photo="'+e.img+'"':'')+'></div>'
    +'<div class="main"><div class="t">'+b.expTitle+'</div><div class="s">'+escapeHtml(b.customer.name)+' · '+fmtDate(b.date)+' · '+b.guests+' '+guestWord(b.guests)+' · '+b.codeStr+'</div></div>'
    +'<div class="right"><div class="money">'+money(b.subtotal)+'</div><div class="code" style="color:var(--ocean)">+'+money(b.commission)+' '+t('platform_fee')+'</div></div></div>';
}

/* ============================ 404 ============================ */
function view404(){
  return '<section class="dash"><div class="wrap"><div class="empty"><div class="big">🧭</div><h2 class="h-md">'+t('nf_title')+'</h2><p style="margin-top:8px">'+t('nf_p')+'</p><a href="#/" class="btn btn-primary" style="margin-top:18px">'+t('back_home')+'</a></div></div></section>';
}

/* ============================ BIND AFTER RENDER ============================ */
const _router=router;
router=function(){
  _router();
  const root=(location.hash||'#/').replace('#/','').split('/')[0].split('?')[0];
  if(root==='') bindHome();
  else if(root==='explore') bindExplore();
  else if(root==='experience'){ const id=(location.hash.replace('#/','').split('/')[1]||'').split('?')[0]; const e=expById(id); if(e) bindExperience(e); }
  else if(root==='auth') bindAuth();
  else if(root==='host'){ bindHost(); mountWizNav(); }
  // hydrate any lcard / thumb photos that use data-photo
  document.querySelectorAll('.thumb[data-photo],.ph[data-photo]').forEach(el=>{
    const src=el.getAttribute('data-photo'); el.removeAttribute('data-photo');
    const im=new Image(); im.onload=()=>el.style.backgroundImage='url('+src+')'; im.src=src;
  });
};
function mountWizNav(){
  const card=document.getElementById('wizCard'); if(!card) return;
  // build nav row under card
  const wrap=card.parentElement;
  let nav=document.getElementById('wizNavRow');
  if(nav) nav.remove();
  nav=document.createElement('div'); nav.id='wizNavRow'; nav.className='wiz-nav';
  const back = wizStep>1 ? '<button class="btn btn-line btn-lg" id="wizBackBtn">'+t('back_btn')+'</button>' : '<span></span>';
  const next = wizStep<5 ? '<button class="btn btn-primary btn-lg" id="wizNextBtn">'+t('continue_btn')+'</button>'
    : '<button class="btn btn-dark btn-lg" id="wizSubmitBtn">'+t('submit_app_btn')+'</button>';
  nav.innerHTML=back+next;
  wrap.appendChild(nav);
  const b=document.getElementById('wizBackBtn'); if(b) b.onclick=wizBack;
  const n=document.getElementById('wizNextBtn'); if(n) n.onclick=wizNext;
  const s=document.getElementById('wizSubmitBtn'); if(s) s.onclick=wizSubmit;
}

/* ============================ BOOT ============================ */
document.documentElement.lang=CURRENT_LANG;
if(!location.hash) location.hash='#/';
STORE.experiences=demoExperiences(); // instant content for first paint
router();
(async()=>{ await initAuth(); await loadData(); router(); })();
</script>
